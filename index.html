<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Módulo 7 – Lenguaje Corporal</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 20px;
    background-color: #f4f4f4;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
}

.contenedor {
    width: 100%;
    max-width: 1200px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
}

#diapositiva {
    width: 100%;
    height: auto;
    display: block;
    margin: auto;
}

.controles {
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}

#contador {
    font-size: 16px;
    margin: 0 15px;
}

</style>
</head>

<body>

<h1>Módulo 7 – Lenguaje Corporal</h1>

<div class="contenedor">

<img id="diapositiva"
src="diapositiva_1.jpg"
alt="Diapositiva">

<div class="controles">

<button onclick="anterior()">◀ Anterior</button>

<span id="contador">
Diapositiva 1 de 3
</span>

<button onclick="siguiente()">Siguiente ▶</button>

</div>

</div>

<script>

let diapositivaActual = 1;

const totalDiapositivas = 3;

function mostrarDiapositiva() {

document.getElementById("diapositiva").src =
"diapositiva_" + diapositivaActual + ".jpg";

document.getElementById("contador").innerHTML =
"Diapositiva " + diapositivaActual +
" de " + totalDiapositivas;

}

function siguiente() {

if (diapositivaActual < totalDiapositivas) {

diapositivaActual++;

mostrarDiapositiva();

}

}

function anterior() {

if (diapositivaActual > 1) {

diapositivaActual--;

mostrarDiapositiva();

}

}

</script>

</body>
</html>
